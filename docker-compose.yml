version: "3.9"

services:
  backend:
    build: ./backend
    container_name: govscheme_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WP_URL=${WP_URL}
      - WP_USER=${WP_USER}
      - WP_PASSWORD=${WP_PASSWORD}
      - GMAIL_USER=${GMAIL_USER}
      - GMAIL_PASSWORD=${GMAIL_PASSWORD}
      - NOTIFY_EMAIL=${NOTIFY_EMAIL}
      - SCHEDULER_INTERVAL=${SCHEDULER_INTERVAL:-30}
    restart: unless-stopped
    volumes:
      - ./backend:/app

  frontend:
    image: nginx:alpine
    container_name: govscheme_frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: govscheme_network
